<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Inner Universe · Prototype v0.1</title>
<style>
  :root{
    --bg:#060b14;
    --bg2:#09101d;
    --gold:#d9b66b;
    --gold-soft:#9d7d3c;
    --violet:#7860a8;
    --cyan:#7bb8c9;
    --amber:#7a351a;
    --amber-deep:#32140a;
    --text:#e5d8ba;
    --muted:rgba(220,207,178,.48);
  }
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;background:var(--bg);overflow:hidden}
  body{
    font-family: Inter, "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--text);
    letter-spacing:.02em;
  }
  button,input{font:inherit}
  #app{
    position:relative;width:100%;height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 46%, rgba(27,38,58,.54), transparent 35%),
      radial-gradient(circle at 10% 12%, rgba(51,37,89,.11), transparent 28%),
      linear-gradient(180deg,#060b14 0%, #050913 100%);
  }
  .noise{
    position:absolute;inset:-20%;opacity:.16;pointer-events:none;mix-blend-mode:screen;
    background-image:radial-gradient(rgba(180,200,220,.14) .7px, transparent .7px);
    background-size:11px 11px;
    animation:drift 50s linear infinite;
  }
  .star-field{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .star{
    position:absolute;width:2px;height:2px;border-radius:50%;
    background:#d7c9a5;opacity:.33;box-shadow:0 0 8px rgba(210,194,150,.35);
    animation:twinkle var(--t) ease-in-out infinite alternate;
  }
  .scene{
    position:absolute;inset:0;transform-origin:50% 50%;
    transition:transform 1.65s cubic-bezier(.2,.8,.2,1), filter 1.35s ease;
  }
  .scene::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 52% 52%, transparent 17%, rgba(0,0,0,.2) 67%, rgba(0,0,0,.52) 100%);
    pointer-events:none;
  }
  .self{
    position:absolute;left:50%;top:50%;width:23px;height:23px;margin:-11px;
    border-radius:44% 56% 47% 53% / 54% 44% 56% 46%;
    background:radial-gradient(circle at 32% 28%, #fff0bd 0%, #e7bf6a 28%, #ac7428 66%, #55330c 100%);
    box-shadow:0 0 12px rgba(229,185,95,.9),0 0 38px rgba(205,146,50,.32),0 0 88px rgba(205,146,50,.16);
    animation:seedBreath 8s ease-in-out infinite;
    transition:opacity 1s ease,transform 1.2s ease,filter 1s ease;
  }
  .self::after{
    content:"";position:absolute;inset:-30px;border-radius:50%;
    border:1px solid rgba(226,185,102,.08);filter:blur(.2px);
  }
  .object{
    position:absolute;cursor:default;transition:opacity 1.2s ease,filter 1.2s ease,transform 1.4s cubic-bezier(.2,.8,.2,1);
    transform-origin:center center;
  }
  .object:not(.amber){opacity:.74;filter:saturate(.8)}
  .obj-creative{left:72%;top:34%;width:46px;height:51px;background:#125d69;clip-path:polygon(44% 0,78% 18%,100% 52%,69% 100%,22% 91%,0 49%,19% 14%);box-shadow:0 0 22px rgba(98,209,224,.22);animation:slowFloat 9s ease-in-out infinite alternate}
  .obj-intimacy{left:28%;top:22%;width:43px;height:43px;border-radius:42% 58% 50% 49% / 55% 39% 61% 45%;background:#4e2427;box-shadow:21px 10px 0 -6px #6a3442,0 0 23px rgba(224,112,138,.18);animation:slowFloat 10s ease-in-out -3s infinite alternate}
  .obj-avoidance{left:79%;top:66%;width:38px;height:39px;clip-path:polygon(49% 0,100% 92%,9% 85%);background:#202654;opacity:.47!important;animation:slowFloat 11s ease-in-out -6s infinite alternate}
  .obj-shadow{left:48%;top:77%;width:70px;height:45px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(30,15,61,.84),rgba(12,8,35,.06) 70%);filter:blur(2px);animation:slowFloat 12s ease-in-out -2s infinite alternate}
  .amber{
    left:32%;top:58%;width:72px;height:78px;
    cursor:pointer;z-index:3;
    clip-path:polygon(48% 0,84% 11%,100% 43%,87% 83%,53% 100%,12% 83%,0 42%,15% 13%);
    background:
      radial-gradient(circle at 38% 27%,rgba(233,166,76,.31),transparent 16%),
      radial-gradient(circle at 58% 65%,rgba(169,80,30,.18),transparent 28%),
      linear-gradient(145deg,#532313 0%,#2d1009 70%);
    box-shadow:0 0 0 1px rgba(195,132,61,.11),0 0 22px rgba(145,67,20,.13);
    animation:amberBreath 10s ease-in-out infinite;
  }
  .amber:hover{filter:brightness(1.18);transform:scale(1.05)}
  .amber::before{
    content:"";position:absolute;inset:8px;clip-path:inherit;opacity:.34;
    background:linear-gradient(125deg,transparent 12%,rgba(241,190,94,.16) 13%,transparent 19%,transparent 46%,rgba(240,178,68,.10) 47%,transparent 53%);
  }
  .crack{position:absolute;height:2px;background:rgba(216,171,75,.28);transform-origin:left center;box-shadow:0 0 5px rgba(220,173,70,.15);transition:background 1.6s ease,box-shadow 1.6s ease,opacity 1s ease}
  .c1{width:20px;right:-5px;top:29%;transform:rotate(-18deg)}
  .c2{width:16px;left:28%;bottom:21%;transform:rotate(34deg)}
  .c3{width:11px;left:15%;top:54%;transform:rotate(-54deg);opacity:.16}
  .fiber-layer,.debris-layer{position:absolute;inset:-32px;opacity:0;transition:opacity 1.8s ease}
  .fiber-layer span{
    position:absolute;width:1px;height:21px;border-radius:50%;
    background:linear-gradient(180deg,transparent,rgba(236,198,112,.9),transparent);
    transform-origin:50% 50%;filter:blur(.1px);box-shadow:0 0 8px rgba(238,194,95,.42)
  }
  .debris-layer i{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(215,176,95,.72);box-shadow:0 0 8px rgba(215,176,95,.5);transition:transform 2s ease}
  .amber-label{
    position:absolute;left:50%;top:calc(100% + 17px);transform:translateX(-50%);
    color:rgba(221,190,131,.35);font-size:11px;letter-spacing:.15em;white-space:nowrap;
    transition:opacity 1s ease
  }
  .hint{
    position:absolute;left:50%;bottom:12%;transform:translateX(-50%);
    color:rgba(213,185,127,.54);font-size:14px;letter-spacing:.22em;
    opacity:0;transition:opacity .7s ease;pointer-events:none;white-space:nowrap;
    text-shadow:0 0 18px rgba(209,167,84,.18)
  }
  .stage-debug{
    position:absolute;right:17px;top:15px;color:rgba(162,151,126,.24);font:10px ui-monospace,monospace;letter-spacing:.08em;opacity:.8
  }
  .back{
    position:absolute;left:18px;top:16px;border:0;background:transparent;color:rgba(228,214,185,.54);
    padding:8px 0;letter-spacing:.13em;font-size:12px;opacity:0;pointer-events:none;transition:opacity .4s ease;cursor:pointer
  }
  .back:hover{color:#ead7a9}
  .membrane{
    position:absolute;left:50%;top:50%;width:min(56vw,560px);height:min(37vw,360px);
    transform:translate(-50%,-48%) scale(.82);opacity:0;pointer-events:none;
    transition:opacity 1.1s ease,transform 1.35s cubic-bezier(.2,.8,.2,1);
    z-index:10;
    border-radius:44% 56% 61% 39% / 42% 36% 64% 58%;
    background:
      radial-gradient(ellipse at 38% 32%,rgba(197,164,232,.13),transparent 35%),
      radial-gradient(ellipse at 67% 66%,rgba(219,177,87,.11),transparent 31%),
      linear-gradient(137deg,rgba(87,59,139,.19),rgba(11,17,34,.04) 52%,rgba(131,166,191,.09));
    border:1px solid rgba(192,164,223,.14);
    box-shadow:0 0 38px rgba(126,91,177,.12),inset 0 0 45px rgba(192,156,228,.07);
    backdrop-filter:blur(2px);
  }
  .membrane::before,.membrane::after{
    content:"";position:absolute;inset:7%;border-radius:inherit;pointer-events:none
  }
  .membrane::before{border:1px solid rgba(218,185,104,.11);transform:rotate(9deg) scale(.91)}
  .membrane::after{border:1px solid rgba(106,177,202,.08);transform:rotate(-8deg) scale(1.06)}
  .mirror-copy{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:45px 13%;text-align:center;opacity:0;transition:opacity .9s ease .5s;
  }
  .mirror-copy p{margin:0;color:rgba(227,215,237,.78);font-size:clamp(15px,1.9vw,21px);line-height:1.8;letter-spacing:.06em}
  .mirror-copy small{margin-top:25px;color:rgba(204,181,226,.46);font-size:12px;letter-spacing:.16em}
  .entry{
    width:min(390px,78%);margin-top:27px;position:relative;border-bottom:1px solid rgba(218,190,129,.2);padding:4px 0 8px;
  }
  .entry input{
    width:100%;background:transparent;border:0;outline:0;color:rgba(243,226,191,.92);
    text-align:center;font-size:14px;letter-spacing:.07em;padding:8px 0
  }
  .entry input::placeholder{color:rgba(226,208,181,.35)}
  .entry button{
    position:absolute;right:-2px;bottom:7px;background:transparent;border:0;color:rgba(220,190,130,.7);cursor:pointer;
    font-size:13px;letter-spacing:.08em;padding:5px;opacity:.7
  }
  .entry button:hover{opacity:1}
  .response{
    margin-top:25px;min-height:46px;color:rgba(224,207,173,.82);font-size:14px;line-height:1.8;letter-spacing:.06em;
    opacity:0;transform:translateY(7px);transition:opacity .8s ease,transform .8s ease
  }
  .returned-glimmer{
    position:absolute;left:64%;top:43%;width:7px;height:7px;border-radius:50%;opacity:0;
    background:radial-gradient(circle at 35% 30%, #fff2c1 0%, #e2bc67 38%, #8b6330 100%);
    box-shadow:0 0 10px 4px rgba(232,191,103,.72), 0 0 35px 12px rgba(196,142,62,.32);
    transition:opacity 1.4s ease, transform 1.4s ease;
    transform:scale(.4);
  }
  .returned-glimmer::before,
  .returned-glimmer::after{
    content:"";position:absolute;left:50%;top:50%;border-radius:50%;
    border:1px solid rgba(226,186,98,.38);transform:translate(-50%,-50%) scale(.35);
    opacity:0;
  }
  .returned-glimmer::before{width:26px;height:26px}
  .returned-glimmer::after{width:52px;height:52px}
  @keyframes glimmerPulse{
    0%,100%{filter:brightness(.95)}
    50%{filter:brightness(1.35)}
  }
  #app.gaze .scene{transform:scale(1.92) translate(8%,8%);filter:saturate(.88)}
  #app.gaze .object:not(.amber){opacity:0!important;filter:blur(4px)}
  #app.gaze .self{opacity:.21;transform:scale(.72)}
  #app.gaze .amber{transform:scale(2.62);animation:none}
  #app.gaze .amber:hover{transform:scale(2.62)}
  #app.gaze .amber-label{opacity:0}
  #app.gaze .back{opacity:1;pointer-events:auto}
  #app.gaze .hint{opacity:1}
  #app.revealing .amber .fiber-layer,#app.revealing .amber .debris-layer,#app.mirror .amber .fiber-layer,#app.mirror .amber .debris-layer,#app.responded .amber .fiber-layer,#app.responded .amber .debris-layer{opacity:1}
  #app.revealing .amber .c1,#app.revealing .amber .c2,#app.mirror .amber .c1,#app.mirror .amber .c2,#app.responded .amber .c1,#app.responded .amber .c2{background:rgba(239,194,98,.88);box-shadow:0 0 12px rgba(242,194,91,.78)}
  #app.revealing .hint{opacity:1}
  #app.mirror .hint,#app.responded .hint{opacity:0}
  #app.mirror .membrane,#app.responded .membrane{opacity:1;transform:translate(-50%,-48%) scale(1);pointer-events:auto}
  #app.mirror .mirror-copy,#app.responded .mirror-copy{opacity:1}
  #app.responded .response{opacity:1;transform:translateY(0)}
  #app.returned .returned-glimmer,
#app.macro.returned .returned-glimmer{
  opacity:1;
  transform:scale(1);
  animation:glimmerPulse 4s ease-in-out infinite;
}
#app.returned .returned-glimmer::before,
#app.returned .returned-glimmer::after,
#app.macro.returned .returned-glimmer::before,
#app.macro.returned .returned-glimmer::after{
  opacity:1;
  animation:glimmerRing 3.8s ease-out infinite;
}
#app.returned .returned-glimmer::after,
#app.macro.returned .returned-glimmer::after{animation-delay:1.35s}
@keyframes glimmerRing{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:.45}
  72%{opacity:0}
  100%{transform:translate(-50%,-50%) scale(1.45);opacity:0}
}
  #app.returned .amber .fiber-layer,#app.returned .amber .debris-layer{opacity:.66}
  #app.returned .amber .c1,#app.returned .amber .c2{background:rgba(230,182,83,.65);box-shadow:0 0 8px rgba(230,182,83,.45)}
  @keyframes seedBreath{50%{transform:scale(1.075);filter:brightness(1.12)}}
  @keyframes amberBreath{50%{filter:brightness(1.07);transform:translateY(-2px)}}
  @keyframes slowFloat{50%{transform:translateY(-8px) rotate(5deg)}}
  @keyframes twinkle{to{opacity:.72;transform:scale(1.5)}}
  @keyframes drift{to{transform:translate(7%,4%)}}
  @media (max-width:680px){
    .membrane{width:87vw;height:62vw}
    #app.gaze .scene{transform:scale(2.35) translate(8%,7%)}
    .amber{left:29%;top:56%}
  }

  .macro-glimmer{
    position:absolute;
    left:69%;
    top:31%;
    z-index:20;
    width:76px;
    height:76px;
    opacity:0;
    transform:translate(-50%,-50%) scale(.45);
    pointer-events:none;
    transition:opacity 1.1s ease,transform 1.25s cubic-bezier(.2,.8,.2,1);
  }
  .macro-glimmer.visible{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  .macro-glimmer-core{
    position:absolute;
    left:50%;top:50%;
    width:11px;height:11px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle at 34% 30%,#fff7d2 0%,#efd07c 35%,#c68d37 67%,#55320c 100%);
    box-shadow:0 0 10px 4px rgba(238,196,104,.82),0 0 38px 17px rgba(213,156,63,.38);
    animation:glimmerCore 3.8s ease-in-out infinite;
  }
  .macro-glimmer-ring{
    position:absolute;
    left:50%;top:50%;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(.28);
    border:1px solid rgba(237,199,109,.56);
    opacity:0;
  }
  .ring-a{width:34px;height:34px;animation:macroRing 3.6s ease-out infinite}
  .ring-b{width:68px;height:68px;animation:macroRing 3.6s ease-out 1.4s infinite}
  .macro-glimmer-label{
    position:absolute;
    top:calc(50% + 19px);
    left:50%;
    transform:translateX(-50%);
    color:rgba(229,205,150,.72);
    white-space:nowrap;
    font-size:11px;
    letter-spacing:.13em;
    text-shadow:0 0 12px rgba(224,179,86,.42);
  }
  @keyframes glimmerCore{
    0%,100%{filter:brightness(.94);transform:translate(-50%,-50%) scale(.92)}
    50%{filter:brightness(1.42);transform:translate(-50%,-50%) scale(1.12)}
  }
  @keyframes macroRing{
    0%{transform:translate(-50%,-50%) scale(.25);opacity:.62}
    70%{opacity:0}
    100%{transform:translate(-50%,-50%) scale(1.45);opacity:0}
  }


  .settle-btn{
    margin-top:16px;
    background:transparent;
    border:0;
    color:rgba(223,194,135,.72);
    font-size:12px;
    letter-spacing:.14em;
    cursor:pointer;
    opacity:0;
    transform:translateY(6px);
    pointer-events:none;
    transition:opacity .6s ease,transform .6s ease,color .25s ease;
  }
  .settle-btn:hover{color:rgba(249,224,165,.96)}
  #app.responded .settle-btn{opacity:1;transform:translateY(0);pointer-events:auto}

</style>
</head>
<body>
<div id="app" class="macro">
  <div class="noise"></div>
  <div class="star-field" id="stars"></div>
  <button class="back" id="backBtn">← 回到远处</button>
  <div class="stage-debug" id="stage">MACRO</div>

  <div class="scene" id="scene">
    <div class="self"></div>
    <div class="object obj-creative"></div>
    <div class="object obj-intimacy"></div>
    <div class="object obj-avoidance"></div>
    <div class="object obj-shadow"></div>

    <div class="object amber" id="amber" role="button" aria-label="靠近裂纹琥珀记忆体" tabindex="0">
      <span class="crack c1"></span><span class="crack c2"></span><span class="crack c3"></span>
      <div class="fiber-layer" id="fibers"></div>
      <div class="debris-layer" id="debris"></div>
      <div class="amber-label">未命名的记忆</div>
    </div>
    <div class="returned-glimmer"></div>
  </div>

  <div class="hint" id="hint">停留片刻。</div>
  <div class="macro-glimmer" id="macroGlimmer" aria-hidden="true">
    <div class="macro-glimmer-core"></div>
    <div class="macro-glimmer-ring ring-a"></div>
    <div class="macro-glimmer-ring ring-b"></div>
    <div class="macro-glimmer-label">一个尚未命名的微光</div>
  </div>

  <section class="membrane" id="membrane" aria-live="polite">
    <div class="mirror-copy">
      <p id="mirrorPrompt">你愿意停下来，说一点吗？</p>
      <small id="subPrompt">此刻，你感觉到了什么？</small>
      <div class="entry">
        <input id="userInput" maxlength="90" placeholder="此刻，你感觉到了什么？" autocomplete="off" />
        <button id="sendBtn" type="button" aria-label="回应">回应</button>
      </div>
      <div class="response" id="response"></div>
      <button class="settle-btn" id="settleBtn" type="button">让它沉入其中</button>
    </div>
  </section>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const amber = document.getElementById('amber');
  const backBtn = document.getElementById('backBtn');
  const hint = document.getElementById('hint');
  const stage = document.getElementById('stage');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const response = document.getElementById('response');
  const stars = document.getElementById('stars');
  const fibers = document.getElementById('fibers');
  const debris = document.getElementById('debris');
  const macroGlimmer = document.getElementById('macroGlimmer');
  const settleBtn = document.getElementById('settleBtn');

  let state = 'macro';
  let timers = [];

  function makeStars(){
    for(let i=0;i<62;i++){
      const s=document.createElement('i');
      s.className='star';
      s.style.left=(Math.random()*100)+'%';
      s.style.top=(Math.random()*100)+'%';
      s.style.setProperty('--t',(3+Math.random()*7)+'s');
      s.style.opacity=(.14+Math.random()*.48).toFixed(2);
      stars.appendChild(s);
    }
    for(let i=0;i<14;i++){
      const f=document.createElement('span');
      f.style.left=(10+Math.random()*80)+'%';
      f.style.top=(7+Math.random()*86)+'%';
      f.style.transform=`rotate(${Math.random()*150-75}deg) scale(${.55+Math.random()*.75})`;
      fibers.appendChild(f);
    }
    for(let i=0;i<20;i++){
      const d=document.createElement('i');
      d.style.left=(Math.random()*100)+'%';
      d.style.top=(Math.random()*100)+'%';
      d.style.transform=`translate(${(Math.random()-.5)*26}px,${(Math.random()-.5)*26}px)`;
      debris.appendChild(d);
    }
  }

  function clearTimers(){ timers.forEach(clearTimeout); timers=[]; }
  function later(fn,ms){ timers.push(setTimeout(fn,ms)); }
  function setState(next){
    state=next;
    app.className=next;
    stage.textContent=next.toUpperCase();
  }
  function returnMacro(){
    clearTimers();
    setState('returned');
    hint.textContent='远处多了一点微光。';
    macroGlimmer.classList.add('visible');

    later(() => {
      setState('macro');
      hint.textContent='远处多了一点微光。';
      response.textContent='';
      input.value='';
      input.disabled=false;
      sendBtn.disabled=false;
      sendBtn.textContent='回应';
      document.getElementById('mirrorPrompt').textContent='你愿意停下来，说一点吗？';
      document.getElementById('subPrompt').textContent='此刻，你感觉到了什么？';
    }, 1900);
  }
  function mirrorReply(text){
    const t=text.toLowerCase();
    if(/退|靠近|离开|亲密|关系/.test(t)) return '当你说“先退开”时，这个部分似乎在保护什么。';
    if(/看见|忽略|没人|不在乎/.test(t)) return '它像是很久以前就学会了，把自己放在不被注意的地方。';
    if(/怕|恐惧|拒绝|失去/.test(t)) return '也许它不是在阻止你靠近，而是在替你守住某种旧的边界。';
    if(/控制|必须|应该|完美/.test(t)) return '它似乎一直在努力让一切不要失控。';
    return '你说出的这句话，像让它内部某一处微弱地亮了一下。';
  }

  function enterGaze(){
    if(state!=='macro') return;
    setState('gaze');
    hint.textContent='停留片刻。';
    later(() => {
      if(state!=='gaze') return;
      setState('revealing');
      hint.textContent='它开始显现。';
    }, 5000);
    later(() => {
      if(state!=='revealing') return;
      setState('mirror');
      input.focus();
    }, 6800);
  }

  function submit(){
    const text=input.value.trim();
    if(!text || (state!=='mirror' && state!=='responded')) return;
    response.textContent=mirrorReply(text);
    input.disabled = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '已听见';
    document.getElementById('mirrorPrompt').textContent = '它没有给出结论，只是停在这里。';
    document.getElementById('subPrompt').textContent = '这句话正在缓慢沉入它的内部。';
    setState('responded');
  }

  amber.addEventListener('click',enterGaze);
  amber.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' ') enterGaze();});
  backBtn.addEventListener('click',returnMacro);
  sendBtn.addEventListener('click',submit);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') submit();});
  settleBtn.addEventListener('click',returnMacro);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape' && state!=='macro') returnMacro();});
  makeStars();
})();
</script>
</body>
</html>
